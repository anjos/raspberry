services:
  # Plex Media Server (and web client)
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    hostname: plex
    network_mode: host
    healthcheck:
      test: curl --fail http://localhost:32400/web/index.html || exit 1
      interval: 60s
      retries: 5
      start_period: 30s
      timeout: 2s
    volumes:
      - media_plex:/config
      - /media:/data
      - /media/tmp:/transcode
    environment:
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    devices:
      - /dev/dri:/dev/dri
  # Bittorrent client
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    hostname: qbittorrent
    networks:
      - network
    ports:
      - 8123:8123
      - 6881:6881
      - 6881:6881/udp
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8123 || exit 1"]
      interval: 60s
      retries: 5
      start_period: 30s
      timeout: 2s
    volumes:
      - media_qbittorrent:/config
      - /media/downloads:/media/downloads
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - WEBUI_PORT=8123
      - TORRENTING_PORT=6881
  # Movie downloader/manager for usenet and torrent users.
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    hostname: radarr
    networks:
      - network
    ports:
      - 7878:7878
    healthcheck:
      test: curl --fail localhost:7878 || exit 1
      interval: 60s
      retries: 5
      start_period: 30s
      timeout: 2s
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - media_radarr:/config
      - /media:/media
  # TV show downloader/manager for usenet and torrent users.
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    hostname: sonarr
    networks:
      - network
    ports:
      - 8989:8989
    healthcheck:
      test: curl --fail localhost:8989 || exit 1
      interval: 60s
      retries: 5
      start_period: 30s
      timeout: 2s
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - media_sonarr:/config
      - /media:/media
  # Centralized indexer
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    hostname: prowlarr
    networks:
      - network
    ports:
      - 9696:9696
    healthcheck:
      test: curl --fail localhost:9696 || exit 1
      interval: 60s
      retries: 5
      start_period: 30s
      timeout: 2s
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - media_prowlarr:/config
  # Captcha solver for cloudfare human controls
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    hostname: flaresolverr
    networks:
      - network
    ports:
      - 8191:8191
    healthcheck:
      test: curl --fail localhost:8191 || exit 1
      interval: 60s
      retries: 5
      start_period: 30s
      timeout: 2s
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
# Networks for media services - allow services to be recognized by name
networks:
  network:
    driver: bridge
# Create volumes by visiting the "Volumes" tab on the left
volumes:
  media_plex:
    external: true
  media_qbittorrent:
    external: true
  media_radarr:
    external: true
  media_sonarr:
    external: true
  media_prowlarr:
    external: true
